<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena Dodge</title>

<style>

body{
margin:0;
background:#0b1020;
color:white;
font-family:Arial;
overflow:hidden;
}

canvas{
background:#151a30;
display:block;
margin:auto;
}

#menu,#gameover,#shop,#leaderboard{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000d;
padding:20px;
border-radius:12px;
width:300px;
}

#hud{
position:absolute;
top:10px;
left:10px;
display:none;
}

#bottom{
position:absolute;
bottom:10px;
left:10px;
display:none;
}

button{
padding:10px;
margin-top:5px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="menu">
<h2>Arena Dodge</h2>
<input id="name" placeholder="Name">
<button onclick="start()">Start</button>
</div>

<div id="hud">
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span>
</div>

<div id="bottom">
Dash: <span id="dash">Ready</span><br>
<button onclick="openShop()">Shop</button>
<button onclick="openLeaderboard()">Leaderboard</button>
</div>

<div id="shop" style="display:none">
<h3>Shop</h3>

<button onclick="buySkin('cyan',0)">Cyan (Free)</button>
<button onclick="buySkin('green',50)">Green (50)</button>
<button onclick="buySkin('red',100)">Red (100)</button>
<button onclick="buySkin('purple',200)">Purple (200)</button>
<button onclick="buySkin('gold',500)">Gold (500)</button>

<button onclick="closeShop()">Close</button>
</div>

<div id="leaderboard" style="display:none">
<h3>Leaderboard</h3>
<div id="scores"></div>
<button onclick="closeLeaderboard()">Close</button>
</div>

<div id="gameover" style="display:none">
<h2>Game Over</h2>
<button onclick="restart()">Restart</button>
</div>

<canvas id="game" width="900" height="600"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = window.supabase.createClient(
"https://sddlcfibzeehruzhbrqx.supabase.co",
"sb_publishable_Vwa85CK6aYkQaZt6Bn8aBQ_hjRein_O"
)

let deviceId=localStorage.getItem("device_id")

if(!deviceId){
deviceId=Math.random().toString(36)
localStorage.setItem("device_id",deviceId)
}

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let state="menu"
let score=0
let coins=0

let dashCooldown=0

let skin="cyan"

let player={x:450,y:300,size:20,speed:4}

const blocks=[
{x:200,y:200,w:120,h:40},
{x:500,y:120,w:40,h:150},
{x:350,y:420,w:200,h:40}
]

let enemies=[]
let coinList=[]

const keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.code==="Space" && dashCooldown<=0){
dash()
}

})

document.addEventListener("keyup",e=>keys[e.key]=false)

function start(){

document.getElementById("menu").style.display="none"
document.getElementById("hud").style.display="block"
document.getElementById("bottom").style.display="block"

state="play"

spawnEnemy()
spawnCoins()

loop()

}

function restart(){
location.reload()
}

function dash(){

dashCooldown=3

player.x+= (Math.random()-0.5)*200
player.y+= (Math.random()-0.5)*200

}

function spawnEnemy(){

setInterval(()=>{

if(state!=="play")return

enemies.push({
x:Math.random()*800+50,
y:Math.random()*500+50,
vx:(Math.random()*4)-2,
vy:(Math.random()*4)-2,
size:18
})

},1500)

}

function spawnCoins(){

setInterval(()=>{

coinList.push({
x:Math.random()*800+50,
y:Math.random()*500+50,
size:12
})

},2000)

}

function collide(a,b){

return(
a.x<b.x+b.w &&
a.x+a.size>b.x &&
a.y<b.y+b.h &&
a.y+a.size>b.y
)

}

function update(){

if(state!=="play")return

if(dashCooldown>0){
dashCooldown-=0.016
document.getElementById("dash").innerText=dashCooldown.toFixed(1)
}else{
document.getElementById("dash").innerText="Ready"
}

let oldX=player.x
let oldY=player.y

if(keys["w"]||keys["ArrowUp"])player.y-=player.speed
if(keys["s"]||keys["ArrowDown"])player.y+=player.speed
if(keys["a"]||keys["ArrowLeft"])player.x-=player.speed
if(keys["d"]||keys["ArrowRight"])player.x+=player.speed

blocks.forEach(b=>{
if(collide(player,b)){
player.x=oldX
player.y=oldY
}
})

enemies.forEach(e=>{

e.x+=e.vx
e.y+=e.vy

if(e.x<0||e.x>900)e.vx*=-1
if(e.y<0||e.y>600)e.vy*=-1

if(
player.x<e.x+e.size &&
player.x+player.size>e.x &&
player.y<e.y+e.size &&
player.y+player.size>e.y
){
gameOver()
}

})

coinList.forEach((c,i)=>{

if(
player.x<c.x+12 &&
player.x+player.size>c.x &&
player.y<c.y+12 &&
player.y+player.size>c.y
){

coins++
score+=50
coinList.splice(i,1)

}

})

score++

document.getElementById("score").innerText=score
document.getElementById("coins").innerText=coins

}

function gameOver(){

state="over"

submitScore()

document.getElementById("gameover").style.display="block"

}

function draw(){

ctx.clearRect(0,0,900,600)

ctx.fillStyle="#2a315a"

blocks.forEach(b=>{
ctx.fillRect(b.x,b.y,b.w,b.h)
})

ctx.fillStyle=skin

ctx.fillRect(player.x,player.y,player.size,player.size)

ctx.fillStyle="#ff3b5c"

enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.size,e.size)
})

ctx.fillStyle="#ffd84d"

coinList.forEach(c=>{
ctx.fillRect(c.x,c.y,12,12)
})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

function buySkin(color,price){

if(coins>=price){

coins-=price
skin=color

}

}

function openShop(){
document.getElementById("shop").style.display="block"
}

function closeShop(){
document.getElementById("shop").style.display="none"
}

async function submitScore(){

let name=document.getElementById("name").value || "Player"

await supabase
.from("score")
.upsert({
name:name,
score:score,
device_id:deviceId,
game_id:"arena_dodge"
})

}

async function openLeaderboard(){

document.getElementById("leaderboard").style.display="block"

const {data}=await supabase
.from("score")
.select("*")
.order("score",{ascending:false})
.limit(20)

let html=""

data.forEach(s=>{
html+=s.name+" - "+s.score+"<br>"
})

document.getElementById("scores").innerHTML=html

}

function closeLeaderboard(){
document.getElementById("leaderboard").style.display="none"
}

</script>

</body>
</html>
